apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: ecommerce-tools/order-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/ecommerce_tools"
            - name: SPRING_DATASOURCE_USERNAME
              value: "tools_user"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "tools_pass"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  selector:
    app: order-service
  ports:
    - port: 8080
      targetPort: 8080
  type: NodePort
---
# Used by frontend Nginx proxy (proxy_pass http://backend-service:8080)
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: order-service
  ports:
    - port: 8080
      targetPort: 8080
